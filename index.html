<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Performance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
    </style>
</head>

<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto mb-8 flex justify-between">
    <h1 class="text-3xl font-bold">🏥 ER Dashboard</h1>
</div>

<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    <div class="card p-4">
        <p>ผู้ป่วยทั้งหมด</p>
        <h2 id="totalPatients" class="text-3xl font-bold"></h2>
    </div>
    <div class="card p-4">
        <p>อัตรารอดชีวิต</p>
        <h2 id="survivalRate" class="text-3xl font-bold"></h2>
    </div>
    <div class="card p-4">
        <p>Refer</p>
        <h2 id="referCount" class="text-3xl font-bold"></h2>
    </div>
    <div class="card p-4">
        <p>เสียชีวิต</p>
        <h2 id="deathCount" class="text-3xl font-bold"></h2>
    </div>
</div>

<div class="grid md:grid-cols-2 gap-6 mb-6">
    <div class="card p-4">
        <canvas id="triageChart"></canvas>
    </div>
    <div class="card p-4">
        <canvas id="dispositionChart"></canvas>
    </div>
</div>

<div class="card">
    <table class="w-full text-sm">
        <thead>
            <tr class="bg-gray-100">
                <th class="p-2">CID</th>
                <th>ชื่อ</th>
                <th>เพศ</th>
                <th>ระดับ</th>
                <th>สถานะ</th>
                <th>เสียชีวิต</th>
            </tr>
        </thead>
        <tbody id="patientTableBody"></tbody>
    </table>
</div>

<script>

const rawData = [
    { cid: 1, name: "นายก ไก่", gender: "ชาย", triage: 4, status: "Refer", death: "N" },
    { cid: 2, name: "นายข ไข่", gender: "ชาย", triage: 3, status: "Admit", death: "N" },
    { cid: 3, name: "นายค คน", gender: "ชาย", triage: 2, status: "D/C", death: "N" },
    { cid: 4, name: "น.ส.ง ไม่งง", gender: "หญิง", triage: 1, status: "D/C", death: "Y" },
    { cid: 5, name: "น.ส.จ จีบ", gender: "หญิง", triage: 5, status: "Refer", death: "N" },
    { cid: 6, name: "น.ส.อ อ่าง", gender: "หญิง", triage: 5, status: "Refer", death: "N" },
    { cid: 7, name: "ทดสอบ", gender: "หญิง", triage: 1, status: "Refer", death: "Y" },
    { cid: 8, name: "อิอิ อุอุ", gender: "ชาย", triage: 5, status: "D/C", death: "N" },
];

let triageChartInstance;
let dispositionChartInstance;

window.onload = () => updateDashboard(rawData);

function updateDashboard(data){

    const total = data.length;
    const deaths = data.filter(p => p.death === "Y").length;
    const refer = data.filter(p => p.status === "Refer").length;

    document.getElementById('totalPatients').innerText = total;
    document.getElementById('deathCount').innerText = deaths;
    document.getElementById('referCount').innerText = refer;
    document.getElementById('survivalRate').innerText = ((total - deaths)/total*100).toFixed(1) + "%";

    // ===== TRIAGE =====
    const triageCounts = [0,0,0,0,0];
    data.forEach(p => triageCounts[p.triage-1]++);

    if(triageChartInstance) triageChartInstance.destroy();

    triageChartInstance = new Chart(document.getElementById('triageChart'),{
        type:'bar',
        data:{
            labels:[
                'ระดับ 1 (วิกฤต)',
                'ระดับ 2 (หนัก)',
                'ระดับ 3 (เร่งด่วน)',
                'ระดับ 4 (ไม่รุนแรง)',
                'ระดับ 5 (ทั่วไป)'
            ],
            datasets:[{
                data:triageCounts,
                backgroundColor:[
                    '#dc2626', // แดง
                    '#ec4899', // ชมพู
                    '#facc15', // เหลือง
                    '#22c55e', // เขียว
                    '#ffffff'  // ขาว
                ],
                borderColor:[
                    '#dc2626',
                    '#ec4899',
                    '#facc15',
                    '#22c55e',
                    '#94a3b8'
                ],
                borderWidth:1
            }]
        },
        options:{plugins:{legend:{display:false}}}
    });

    // ===== DISPOSITION =====
    const statusMap = {};
    data.forEach(p => statusMap[p.status] = (statusMap[p.status]||0)+1);

    if(dispositionChartInstance) dispositionChartInstance.destroy();

    dispositionChartInstance = new Chart(document.getElementById('dispositionChart'),{
        type:'doughnut',
        data:{
            labels:Object.keys(statusMap),
            datasets:[{
                data:Object.values(statusMap)
            }]
        }
    });

    // ===== TABLE =====
    const table = document.getElementById('patientTableBody');
    table.innerHTML = '';

    const triageConfig = {
        1: { color: 'bg-red-600 text-white', text: 'ผู้ป่วยฉุกเฉินวิกฤต' },
        2: { color: 'bg-pink-500 text-white', text: 'ผู้ป่วยฉุกเฉินหนัก' },
        3: { color: 'bg-yellow-400 text-black', text: 'ผู้ป่วยฉุกเฉินเร่งด่วน' },
        4: { color: 'bg-green-500 text-white', text: 'ผู้ป่วยไม่รุนแรง' },
        5: { color: 'bg-white text-black border', text: 'ผู้ป่วยทั่วไป' }
    };

    data.forEach(p=>{
        const row = document.createElement('tr');

        row.innerHTML = `
            <td class="p-2">${p.cid}</td>
            <td>${p.name}</td>
            <td>${p.gender}</td>
            <td>
                <span class="${triageConfig[p.triage].color} px-2 py-1 rounded text-xs">
                    ระดับ ${p.triage} - ${triageConfig[p.triage].text}
                </span>
            </td>
            <td>${p.status}</td>
            <td class="${p.death==='Y'?'text-red-600':''}">${p.death}</td>
        `;
        table.appendChild(row);
    });
}

</script>

</body>
</html>
